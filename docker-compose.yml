version: "3.9"

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Spring Boot Application
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-project:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crypto
      SPRING_DATASOURCE_USERNAME: crypto_user
      SPRING_DATASOURCE_PASSWORD: crypto_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      PYTHON_API_URL: http://python-service:8000
    depends_on:
      - postgres
      - python-service
    restart: unless-stopped

  # 3. Python Analytics Microservice
  python-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: crypto-analytics:latest
    ports:
      - "8000:8000"
    environment:
      PG_USER: adminmartina
      PG_PASSWORD: Andrejcar123!
      PG_HOST: kriptoserver.postgres.database.azure.com
      PG_DB: crypto
      PG_PORT: 5432
      PG_SSLMODE: require

    volumes:
      - ./python/lstm/models:/app/lstm/models
    restart: unless-stopped

volumes:
  pgdata:
