version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
