<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="'History — ' + ${symbol}">History</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 24px;
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 900px;
            margin: 20px 0;
        }
        th, td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #e6e6e6;
            font-size: 14px;
        }
        th { font-weight: 600; }
        a.button {
            text-decoration: none;
            color: white;
            background-color: #0b5ed7;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        a.button:hover { background-color: #084298; }
        .header { display:flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
        .meta { margin-bottom: 12px; color: #666; font-size: 13px; }
        .pager { margin-top: 16px; display: flex; justify-content: center; }
        .pagination { list-style: none; display: flex; padding: 0; }
        .pagination li { margin: 0 4px; }
        .pagination a {
            text-decoration: none;
            color: #0b5ed7;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .pagination a:hover { background-color: #0b5ed7; color: white; }
        .pagination .active a { background-color: #0b5ed7; color: white; }
        .pagination .disabled a { color: #ccc; border-color: #ccc; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 th:text="${symbol}">SYMBOL</h2>
    <a th:href="@{/cryptos}" class="button">Back to List</a>
</div>

<div class="meta">
    <span th:if="${latest != null}">
        Latest: <strong th:text="${latest.close}">0.00</strong>
        (date: <span th:text="${latest.date}">YYYY-MM-DD</span>)
    </span>
</div>

<div class="meta">
    Showing page <span th:text="${page.number + 1}">1</span> of <span th:text="${page.totalPages}">1</span>
</div>

<table>
    <thead>
    <tr>
        <th>Date</th>
        <th>Open</th>
        <th>High</th>
        <th>Low</th>
        <th>Close</th>
        <th>Volume</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d : ${page.content}">
        <td th:text="${d.date}">YYYY-MM-DD</td>
        <td th:text="${d.open}">0.00</td>
        <td th:text="${d.high}">0.00</td>
        <td th:text="${d.low}">0.00</td>
        <td th:text="${d.close}">0.00</td>
        <td th:text="${d.volume}">0</td>
    </tr>
    <tr th:if="${#lists.isEmpty(page.content)}">
        <td colspan="6" class="meta">No history for this symbol.</td>
    </tr>
    </tbody>
</table>

<div th:replace="fragments/paging :: pageSection(${page})"></div>

</body>
</html>
