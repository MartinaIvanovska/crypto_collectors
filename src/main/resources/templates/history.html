<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="'History — ' + ${symbol}">History</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0; /* Let header handle spacing */
            color: #e0e0e0;
            background-color: #121212;
        }

        /* wrapper for page content */
        .page-container {
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        a.button {
            text-decoration: none;
            color: white;
            background-color: #17a2b8;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 13px;
            transition: background 0.2s;
            margin-left: 12px;
        }

        a.button:hover {
            background-color: #117a8b;
        }

        .meta {
            margin-bottom: 12px;
            color: #aaaaaa;
            font-size: 13px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 900px;
            margin: 20px 0;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 8px 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            font-weight: 600;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }

        td {
            background-color: #1e1e1e;
        }

        tr:hover td {
            background-color: #2a2a2a;
        }
        .pagination li {
            margin: 0 4px;
        }

        .pagination a {
            text-decoration: none;
            color: #17a2b8;
            padding: 5px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .pagination a:hover {
            background-color: #117a8b;
            color: white;
        }

        .pagination .active a {
            background-color: #17a2b8;
            color: white;
        }

        .pagination .disabled a {
            color: #555;
            border-color: #555;
            pointer-events: none;
        }
        .pager {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        .pagination {
            list-style: none;
            display: flex;
            padding: 0;
        }

    </style>
</head>
<body>


<div th:replace="fragments/header :: header"></div>


<div class="page-container">

    <!-- Title and Back button -->
    <div style="display: flex; align-items: baseline;">
        <h2 th:text="${symbol}">SYMBOL</h2>
        <a th:href="@{/cryptos}" class="button">Back to List</a>
    </div>


    <div class="meta" th:if="${latest != null}">
        Latest: <strong th:text="${latest.close}">0.00</strong>
        (date: <span th:text="${latest.date}">YYYY-MM-DD</span>)
    </div>


    <div class="meta">
        Showing page <span th:text="${page.number + 1}">1</span> of <span th:text="${page.totalPages}">1</span>
    </div>


    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Open</th>
            <th>High</th>
            <th>Low</th>
            <th>Close</th>
            <th>Volume</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${page.content}">
            <td th:text="${d.date}">YYYY-MM-DD</td>
            <td th:text="${d.open}">0.00</td>
            <td th:text="${d.high}">0.00</td>
            <td th:text="${d.low}">0.00</td>
            <td th:text="${d.close}">0.00</td>
            <td th:text="${d.volume}">0</td>
        </tr>
        <tr th:if="${#lists.isEmpty(page.content)}">
            <td colspan="6" class="meta">No history for this symbol.</td>
        </tr>
        </tbody>
    </table>


    <div th:replace="fragments/paging :: pageSection(${page})"></div>

</div>
</body>
</html>
