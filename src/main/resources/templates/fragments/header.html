<header xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <style>
        .header {
            background-color: #1e1e1e;
            color: #e0e0e0;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .header .title {
            font-size: 22px;
            font-weight: bold;
        }

        .header .auth-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header button, .header a {
            background-color: #17a2b8;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .header button:hover, .header a:hover {
            background-color: #117a8b;
        }

        .header .username {
            font-weight: bold;
        }
        .pagination li {
            margin: 0 4px;
        }

        .pagination a {
            text-decoration: none;
            color: #17a2b8;
            padding: 5px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .pagination a:hover {
            background-color: #117a8b;
            color: white;
        }

        .pagination .active a {
            background-color: #17a2b8;
            color: white;
        }

        .pagination .disabled a {
            color: #555;
            border-color: #555;
            pointer-events: none;
        }

        .pager {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }
        .pagination {
            list-style: none;
            display: flex;
            padding: 0;
        }
    </style>

    <div class="header">
        <a class="title" th:href="@{/home}" style="color: white; text-decoration: none">
            Crypto Collectors
        </a>

        <div class="auth-buttons">

            <span sec:authorize="isAuthenticated()" class="username">
                <i class="fa fa-user"></i> <span sec:authentication="name"></span>
            </span>


            <a sec:authorize="isAnonymous()" href="/login">Login</a>


            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>
