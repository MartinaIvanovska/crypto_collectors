<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Cryptos — Latest</title>

    <style>
        :root{
            --bg:#0f1720;
            --card:#0f1726;
            --muted:#9aa4b2;
            --accent:#2dd4bf;
            --accent-2:#06b6d4;
            --surface:#0b1220;
            --glass: rgba(255,255,255,0.03);
        }

        /* reset + base */
        * { box-sizing: border-box; }
        html,body { height:100%; }
        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #e6eef6;
            background: #121212;
            /*        radial-gradient(1200px 600px at 10% 10%, rgba(6,182,212,0.06), transparent 6%),*/
            /*radial-gradient(1000px 500px at 90% 90%, rgba(45,212,191,0.04), transparent 8%),*/
            /*linear-gradient(180deg, var(--bg) 0%, #071019 100%);*/
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
        }

        /* page content wrapper */
        .page-container {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            max-width: 1100px;
            margin: 0 auto;
        }

        header.hgroup {
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:16px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
        }

        /* card container for the table */
        .card {
            width: 100%;
            max-width: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .controls {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom: 12px;
            flex-wrap:wrap;
        }

        .sort-bar {
            display: flex;
            gap: 8px;
        }

        .sort-button {
            text-decoration: none;
            color: var(--muted);
            background: transparent;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 180ms ease;
        }

        .sort-button:hover {
            color: #fff;
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .sort-button.active {
            color: #012a27;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border: none;
            box-shadow: 0 6px 18px rgba(8,145,133,0.16);
        }

        /* table */
        .table-wrap {
            width:100%;
            overflow-x:auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 640px;
            background: transparent;
            border-radius: 8px;
            overflow: hidden;
        }

        thead th {
            text-align: left;
            font-size: 12px;
            letter-spacing: 0.01em;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(0,0,0,0.02));
        }

        tbody td {
            padding: 14px;
            font-size: 14px;
            border-bottom: 1px dashed rgba(255,255,255,0.02);
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: linear-gradient(90deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
        }

        /* symbol badge */
        .symbol {
            display:inline-flex;
            align-items:center;
            gap:10px;
            font-weight:600;
        }

        .symbol .badge {
            min-width:36px;
            height:36px;
            border-radius:8px;
            display:inline-grid;
            place-items:center;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border:1px solid rgba(255,255,255,0.02);
            font-size:13px;
        }

        /* numeric cells */
        .numeric {
            font-variant-numeric: tabular-nums;
            color: #dbeafe;
        }

        .volume {
            color: var(--muted);
            font-size: 13px;
        }

        /* details button */
        a.button {
            text-decoration: none;
            color: #012a27;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            border: none;
            display:inline-block;
            transition: transform 160ms ease;
        }

        a.button:hover { transform: translateY(-3px); }

        /* empty state */
        .empty-row td {
            text-align: center;
            padding: 28px;
            color: var(--muted);
        }

        /* pager area is kept to be replaced by the fragments/paging */
        .pager {
            margin-top: 16px;
            display:flex;
            justify-content:center;
        }

        /* responsive tweaks */
        @media (max-width: 760px) {
            h2 { font-size: 22px; }
            .symbol .badge { min-width:30px; height:30px; font-size:12px; border-radius:6px; }
            thead th { padding:10px; font-size:11px; }
            tbody td { padding:10px; font-size:13px; }
            .card { padding:12px; }
        }
    </style>
</head>

<body>

<!-- header must remain unchanged -->
<div th:replace="fragments/header :: header"></div>

<div class="page-container">

    <div class="hgroup" style="width:100%;">
        <div>
            <h2>Cryptocurrency Dashboard</h2>
            <div class="meta" style="margin-top:6px;">
                Showing page
                <span th:text="${page.number + 1}">1</span>
                of
                <span th:text="${page.totalPages}">1</span>
            </div>
        </div>

        <!-- space reserved for possible actions (kept empty so you can plug in buttons later) -->
        <div style="display:flex;align-items:center;gap:12px;"></div>
    </div>

    <div class="card">

        <div class="controls">
            <div class="sort-bar">
                <a th:href="@{/cryptos(prop='symbol', pageNum=1, pageSize=${page.size})}"
                   class="sort-button"
                   th:classappend="${param.prop == null || param.prop[0] == 'symbol'} ? ' active' : ''">
                    Sort by Symbol
                </a>

                <a th:href="@{/cryptos(prop='volume', pageNum=1, pageSize=${page.size})}"
                   class="sort-button"
                   th:classappend="${param.prop != null && param.prop[0] == 'volume'} ? ' active' : ''">
                    Sort by Volume
                </a>
            </div>

        </div>

        <div class="table-wrap" role="region" aria-label="Crypto table">
            <table>
                <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Date</th>
                    <th>Close</th>
                    <th>Volume</th>
                    <th></th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="row : ${page.content}">
                    <td>
                        <div class="symbol">
<!--                            <span class="badge" th:text="${row.symbol.substring(0, T(java.lang.Math).min(row.symbol.length(), 3)).toUpperCase()}">BTC</span>-->
                            <span th:text="${row.symbol}">BTC</span>
                        </div>
                    </td>

                    <td th:text="${row.date}">YYYY-MM-DD</td>

                    <td class="numeric" th:text="${row.close}">0.00</td>

                    <td class="volume" th:text="${row.volume}">0</td>

                    <td>
                        <a th:href="@{|/cryptos/${row.symbol}|}" class="button">Details</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(page.content)}" class="empty-row">
                    <td colspan="5">No data available.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="fragments/paging :: pageSection(${page})" class="pager"></div>
    </div>
</div>
</body>
</html>
