<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cryptos — Latest</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 24px;
            color: #e0e0e0;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .meta {
            margin-bottom: 16px;
            color: #aaaaaa;
            font-size: 13px;
        }


        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 900px;
            margin: 20px 0;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        th {
            font-weight: 600;
            background-color: #2c2c2c;
        }

        td {
            background-color: #1e1e1e;
        }

        tr:hover td {
            background-color: #2a2a2a;
        }


        a.button {
            text-decoration: none;
            color: white;
            background-color: #17a2b8;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 13px;
            transition: background 0.2s;
        }

        a.button:hover {
            background-color: #117a8b;
        }


        .pager {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }

        .pagination {
            list-style: none;
            display: flex;
            padding: 0;
        }

        .pagination li {
            margin: 0 4px;
        }

        .pagination a {
            text-decoration: none;
            color: #17a2b8;
            padding: 5px 10px;
            border: 1px solid #444;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .pagination a:hover {
            background-color: #117a8b;
            color: white;
        }

        .pagination .active a {
            background-color: #17a2b8;
            color: white;
        }

        .pagination .disabled a {
            color: #555;
            border-color: #555;
            pointer-events: none;
        }
    </style>
</head>
<body>
<header>
    <h2>Cryptocurrency Dashboard</h2>
    <div class="meta small">
        Showing page <span th:text="${page.number + 1}">1</span> of <span th:text="${page.totalPages}">1</span>
    </div>
</header>

<table>
    <thead>
    <tr>
        <th>Symbol</th>
        <th>Date</th>
        <th>Close</th>
        <th>Volume</th>
        <th>Source ts</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${page.content}">
        <td th:text="${row.symbol}">SYMBOL</td>
        <td th:text="${row.date}">YYYY-MM-DD</td>
        <td th:text="${row.close}">0.00</td>
        <td th:text="${row.volume}">0</td>
        <td th:text="${row.sourceTimestamp}">0</td>
        <td>
            <a th:href="@{|/cryptos/${row.symbol}|}" class="button">Details</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(page.content)}">
        <td colspan="6" class="small">No data available.</td>
    </tr>
    </tbody>
</table>

<div th:replace="fragments/paging :: pageSection(${page})"></div>
</body>
</html>
