<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cryptos — Latest</title>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; margin: 24px; color: #111 }
        table { border-collapse: collapse; width: 100%; max-width: 900px; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e6e6e6; font-size: 14px; }
        th { font-weight: 600; }
        a { text-decoration: none; color: #0b5ed7; }
        .meta { margin-bottom: 12px; color: #666; font-size: 13px; }
        .pager { margin-top: 16px; }
        .small { font-size: 12px; color:#666; }
    </style>
</head>
<body>
<h2>Cryptocurrencies — Latest</h2>

<div class="meta small">
    Showing page <span th:text="${page.number + 1}">1</span> of <span th:text="${page.totalPages}">1</span>
</div>

<table>
    <thead>
    <tr>
        <th>Symbol</th>
        <th>Date</th>
        <th>Close</th>
        <th>Volume</th>
        <th>Source ts</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${page.content}">
        <td th:text="${row.symbol}">SYMBOL</td>
        <td th:text="${row.date}">YYYY-MM-DD</td>
        <td th:text="${row.close}">0.00</td>
        <td th:text="${row.volume}">0</td>
        <td th:text="${row.sourceTimestamp}">0</td>
        <td>
            <a th:href="@{|/cryptos/${row.symbol}|}">Details</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(page.content)}">
        <td colspan="6" class="small">No data available.</td>
    </tr>
    </tbody>
</table>

<div class="pager">
    <a th:if="${page.hasPrevious()}"
       th:href="@{/cryptos(page=${page.number - 1}, size=${page.size})}">◀ Previous</a>
    <span th:if="${page.hasPrevious()}" style="margin-right:12px;"></span>
    <a th:if="${page.hasNext()}"
       th:href="@{/cryptos(page=${page.number + 1}, size=${page.size})}">Next ▶</a>
</div>

</body>
</html>
