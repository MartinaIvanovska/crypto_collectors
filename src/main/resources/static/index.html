<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Crypto - latest</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f4f4f4; }
        tr:hover { background: #fafafa; cursor: pointer; }
        #history { margin-top: 16px; }
    </style>
</head>
<body>
<h2>Cryptocurrencies (latest per symbol)</h2>
<div>
    <button onclick="load(0)">Load page 0</button>
    <label>size: <input id="size" type="number" value="50" style="width:60px"></label>
    <label>sort: <input id="sort" type="text" value="volume,desc" style="width:120px"></label>
</div>
<div id="list"></div>

<div id="history"></div>

<script>
    async function load(page) {
        const size = document.getElementById('size').value || 50;
        const sort = document.getElementById('sort').value;
        const res = await fetch(`/api/coins?page=${page}&size=${size}&sort=${encodeURIComponent(sort)}`);
        const body = await res.json();
        renderList(body);
    }

    function renderList(page) {
        const data = page.content || page;
        let html = '<table><thead><tr><th>symbol</th><th>date</th><th>close</th><th>volume</th></tr></thead><tbody>';
        data.forEach(row => {
            html += `<tr onclick="loadHistory('${row.symbol}')"><td>${row.symbol}</td><td>${row.date}</td><td>${row.close}</td><td>${row.volume}</td></tr>`;
        });
        html += '</tbody></table>';
        html += `<div>page ${page.number || 0} / size ${page.size || data.length} / total ${page.totalElements || 'n/a'}</div>`;
        document.getElementById('list').innerHTML = html;
    }

    async function loadHistory(symbol) {
        const res = await fetch(`/api/coins/${symbol}/history?page=0&size=200`);
        const page = await res.json();
        let html = `<h3>History for ${symbol}</h3>`;
        html += '<table><thead><tr><th>date</th><th>open</th><th>high</th><th>low</th><th>close</th><th>volume</th></tr></thead><tbody>';
        (page.content || page).forEach(d => {
            html += `<tr><td>${d.date}</td><td>${d.open}</td><td>${d.high}</td><td>${d.low}</td><td>${d.close}</td><td>${d.volume}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('history').innerHTML = html;
    }
</script>
</body>
</html>
